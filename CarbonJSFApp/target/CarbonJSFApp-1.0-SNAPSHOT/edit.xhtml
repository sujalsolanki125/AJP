<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Edit Record</title>
</h:head>

<h:body style="margin:0; padding:0; font-family:Arial; background:#f8fafc;">

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px;">

<div style="width:100%; max-width:620px; background:white;
border-radius:20px; padding:35px;
box-shadow:0 20px 45px rgba(0,0,0,0.08);">

<h1>Edit Carbon Record</h1>

<h:form id="editForm">

    <!-- IMPORTANT -->
   

    <h:panelGrid columns="3" cellpadding="10">

        <h:outputText value="Electricity" />
        <h:inputText id="electricity"
                     value="#{carbonBean.electricity}"
                     required="true"/>
        <h:message for="electricity" style="color:red"/>

        <h:outputText value="Distance" />
        <h:inputText id="distance"
                     value="#{carbonBean.distance}"
                     required="true"/>
        <h:message for="distance" style="color:red"/>

        <h:outputText value="LPG" />
        <h:inputText id="lpg"
                     value="#{carbonBean.lpg}"
                     required="true"/>
        <h:message for="lpg" style="color:red"/>

        <h:outputText value="Water" />
        <h:inputText id="water"
                     value="#{carbonBean.water}"
                     required="true"/>
        <h:message for="water" style="color:red"/>

        <h:outputText value="Waste" />
        <h:inputText id="waste"
                     value="#{carbonBean.waste}"
                     required="true"/>
        <h:message for="waste" style="color:red"/>

    </h:panelGrid>

    <br/>

    <h:commandButton value="Update Record"
                     action="#{carbonBean.update}"
                     style="background:#2563eb;color:white;
                     border:none;padding:12px 20px;
                     border-radius:8px;" />

    <h:outputLink value="index.xhtml"
                  style="margin-left:15px;">
        Back
    </h:outputLink>

</h:form>

</div>
</div>

</h:body>
</html>
